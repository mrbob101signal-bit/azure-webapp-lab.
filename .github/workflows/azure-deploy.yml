name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Package site
        shell: pwsh
        run: |
          Compress-Archive -Path laurel/* -DestinationPath app.zip -Force

      - name: Deploy with publish profile
        shell: pwsh
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_APP_SERVICE_PUBLISH_PROFILE }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PUBLISH_PROFILE)) {
            throw "Missing GitHub secret AZURE_APP_SERVICE_PUBLISH_PROFILE."
          }

          [xml]$publishProfile = $env:PUBLISH_PROFILE
          $profile = $publishProfile.publishData.publishProfile |
            Where-Object { $_.publishMethod -in @('MSDeploy', 'ZipDeploy') } |
            Select-Object -First 1

          if (-not $profile) {
            throw "Publish profile does not contain an MSDeploy or ZipDeploy profile."
          }

          $publishHost = $profile.publishUrl -replace '^https?://', ''
          $publishHost = $publishHost -replace '/.*$', ''
          $deployUrl = "https://$publishHost/api/zipdeploy?isAsync=false"
          $pair = "$($profile.userName):$($profile.userPWD)"
          $token = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))

          Invoke-RestMethod `
            -Uri $deployUrl `
            -Method Post `
            -Headers @{ Authorization = "Basic $token" } `
            -ContentType "application/zip" `
            -InFile app.zip
