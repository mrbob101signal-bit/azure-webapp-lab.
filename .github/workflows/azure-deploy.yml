name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Read app name from publish profile
        id: publish-profile
        shell: pwsh
        env:
          AZURE_APP_SERVICE_PUBLISH_PROFILE: ${{ secrets.AZURE_APP_SERVICE_PUBLISH_PROFILE }}
        run: |
          [xml]$publishProfile = $env:AZURE_APP_SERVICE_PUBLISH_PROFILE
          $webDeployProfile = $publishProfile.publishData.publishProfile |
            Where-Object { $_.publishMethod -eq 'MSDeploy' } |
            Select-Object -First 1

          if (-not $webDeployProfile) {
            throw "Publish profile does not contain an MSDeploy profile."
          }

          "app_name=$($webDeployProfile.msdeploySite)" >> $env:GITHUB_OUTPUT

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.publish-profile.outputs.app_name }}
          publish-profile: ${{ secrets.AZURE_APP_SERVICE_PUBLISH_PROFILE }}
          package: laurel
